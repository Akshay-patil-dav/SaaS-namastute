spring:
  application:
    name: otp-auth-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/otp_auth_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: localhost
    port: 2525 # dummy mail server port
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: YOUR_GOOGLE_CLIENT_ID
            client-secret: YOUR_GOOGLE_CLIENT_SECRET
            scope: email, profile
          facebook:
            client-id: YOUR_FACEBOOK_CLIENT_ID
            client-secret: YOUR_FACEBOOK_CLIENT_SECRET
            scope: email, public_profile
          shopify:
            client-id: YOUR_SHOPIFY_CLIENT_ID
            client-secret: YOUR_SHOPIFY_CLIENT_SECRET
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: read_customers
        provider:
          shopify:
            authorization-uri: https://your-shop-name.myshopify.com/admin/oauth/authorize
            token-uri: https://your-shop-name.myshopify.com/admin/oauth/access_token
            user-info-uri: https://your-shop-name.myshopify.com/admin/api/2024-01/shop.json
            user-name-attribute: email

server:
  port: 3000

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000 # 1 day in ms
